<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7a6aaa"/>
      <stop offset="50%" stop-color="#9888c8"/>
      <stop offset="100%" stop-color="#624889"/>
    </linearGradient>
    <linearGradient id="innerBorderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#aa9cd4"/>
      <stop offset="30%" stop-color="#c8bae4"/>
      <stop offset="70%" stop-color="#9888c0"/>
      <stop offset="100%" stop-color="#8070b0"/>
    </linearGradient>
  </defs>
  
  <!-- Outer frame -->
  <rect x="15" y="15" width="170" height="170" rx="22" fill="none" stroke="url(#borderGrad)" stroke-width="3" opacity="0.95"/>
  
  <!-- Middle frame -->
  <rect x="22" y="22" width="156" height="156" rx="18" fill="none" stroke="url(#innerBorderGrad)" stroke-width="2.5" opacity="0.8"/>
  
  <!-- Inner fill -->
  <rect x="28" y="28" width="144" height="144" rx="14" fill="#0a0812"/>
  
  <!-- Keyboard body -->
  <rect x="46" y="56" width="108" height="88" rx="8" fill="none" stroke="#8878b0" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Row 1: 3 keys -->
  <rect x="56" y="66" width="24" height="18" rx="3" fill="none" stroke="#c8bae4" stroke-width="1.8" opacity="0.65"/>
  <rect x="88" y="66" width="24" height="18" rx="3" fill="none" stroke="#c8bae4" stroke-width="1.8" opacity="0.65"/>
  <rect x="120" y="66" width="24" height="18" rx="3" fill="none" stroke="#c8bae4" stroke-width="1.8" opacity="0.65"/>
  
  <!-- Row 2: 3 keys -->
  <rect x="56" y="90" width="24" height="18" rx="3" fill="none" stroke="#c8bae4" stroke-width="1.8" opacity="0.65"/>
  <rect x="88" y="90" width="24" height="18" rx="3" fill="none" stroke="#c8bae4" stroke-width="1.8" opacity="0.65"/>
  <rect x="120" y="90" width="24" height="18" rx="3" fill="none" stroke="#c8bae4" stroke-width="1.8" opacity="0.65"/>
  
  <!-- Row 3: spacebar -->
  <rect x="56" y="114" width="88" height="18" rx="3" fill="none" stroke="#c8bae4" stroke-width="1.8" opacity="0.65"/>
</svg>
