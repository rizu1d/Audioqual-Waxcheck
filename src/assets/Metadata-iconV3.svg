<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7a6aaa"/>
      <stop offset="50%" stop-color="#9888c8"/>
      <stop offset="100%" stop-color="#624889"/>
    </linearGradient>
    <linearGradient id="innerBorderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#aa9cd4"/>
      <stop offset="30%" stop-color="#c8bae4"/>
      <stop offset="70%" stop-color="#9888c0"/>
      <stop offset="100%" stop-color="#8070b0"/>
    </linearGradient>
    <linearGradient id="pencilGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDD55A"/>
      <stop offset="100%" stop-color="#F0B830"/>
    </linearGradient>
  </defs>
  
  <!-- Outer frame -->
  <rect x="15" y="15" width="170" height="170" rx="22" fill="none" stroke="url(#borderGrad)" stroke-width="3" opacity="0.95"/>
  
  <!-- Middle frame -->
  <rect x="22" y="22" width="156" height="156" rx="18" fill="none" stroke="url(#innerBorderGrad)" stroke-width="2.5" opacity="0.8"/>
  
  <!-- Inner fill -->
  <rect x="28" y="28" width="144" height="144" rx="14" fill="#0a0812"/>
  
  <!-- Document shape -->
  <rect x="52" y="50" width="75" height="100" rx="4" fill="none" stroke="#9888c0" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Text lines -->
  <line x1="62" y1="68" x2="115" y2="68" stroke="#b8aad4" stroke-width="2.5" stroke-linecap="round" opacity="0.75"/>
  <line x1="62" y1="80" x2="108" y2="80" stroke="#b8aad4" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="62" y1="92" x2="112" y2="92" stroke="#b8aad4" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="62" y1="104" x2="100" y2="104" stroke="#b8aad4" stroke-width="1.8" stroke-linecap="round" opacity="0.65"/>
  <line x1="62" y1="116" x2="95" y2="116" stroke="#b8aad4" stroke-width="1.5" stroke-linecap="round" opacity="0.65"/>
  <line x1="62" y1="128" x2="88" y2="128" stroke="#b8aad4" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  
  <!-- Pencil (edit) overlay -->
  <g transform="translate(118, 90) rotate(-45)">
    <rect x="0" y="0" width="8" height="52" rx="1" fill="url(#pencilGrad)" opacity="0.95"/>
    <polygon points="0,52 4,62 8,52" fill="#FDD55A" opacity="0.85"/>
    <rect x="0" y="0" width="8" height="8" rx="1" fill="#F0B830" opacity="0.75"/>
  </g>
</svg>
