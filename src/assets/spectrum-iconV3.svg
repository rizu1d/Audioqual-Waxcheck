<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6a5a9a"/>
      <stop offset="50%" stop-color="#8878b8"/>
      <stop offset="100%" stop-color="#524479"/>
    </linearGradient>
    <linearGradient id="innerBorderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9a8cc4"/>
      <stop offset="30%" stop-color="#b8aad4"/>
      <stop offset="70%" stop-color="#8878b0"/>
      <stop offset="100%" stop-color="#7060a0"/>
    </linearGradient>
    <linearGradient id="specGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#e8c0d0" stop-opacity="0.75"/>
      <stop offset="20%" stop-color="#c864a0" stop-opacity="0.6"/>
      <stop offset="45%" stop-color="#9040a0" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#5a2888" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#140828" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
  
  <!-- Outer frame -->
  <rect x="15" y="15" width="170" height="170" rx="22" fill="none" stroke="url(#borderGrad)" stroke-width="3" opacity="0.8"/>
  
  <!-- Middle frame -->
  <rect x="22" y="22" width="156" height="156" rx="18" fill="none" stroke="url(#innerBorderGrad)" stroke-width="2.5" opacity="0.6"/>
  
  <!-- Inner fill -->
  <rect x="28" y="28" width="144" height="144" rx="14" fill="#0a0812"/>
  
  <!-- L-shaped axes -->
  <rect x="48" y="50" width="5" height="102" rx="2" fill="url(#innerBorderGrad)" opacity="0.45"/>
  <rect x="48" y="147" width="108" height="5" rx="2" fill="url(#innerBorderGrad)" opacity="0.45"/>
  
  <!-- Spectrogram bars -->
  <rect x="60" y="102" width="7" height="44" rx="1" fill="url(#specGrad)"/>
  <rect x="70" y="80" width="7" height="66" rx="1" fill="url(#specGrad)"/>
  <rect x="80" y="62" width="7" height="84" rx="1" fill="url(#specGrad)"/>
  <rect x="90" y="68" width="7" height="78" rx="1" fill="url(#specGrad)"/>
  <rect x="100" y="74" width="7" height="72" rx="1" fill="url(#specGrad)"/>
  <rect x="110" y="66" width="7" height="80" rx="1" fill="url(#specGrad)"/>
  <rect x="120" y="78" width="7" height="68" rx="1" fill="url(#specGrad)"/>
  <rect x="130" y="92" width="7" height="54" rx="1" fill="url(#specGrad)"/>
  <rect x="140" y="106" width="7" height="40" rx="1" fill="url(#specGrad)"/>
  
  <!-- Frequency cutoff line -->
  <path d="M 58 120 C 65 118, 72 100, 80 85 C 88 70, 92 74, 100 78 C 108 82, 115 72, 122 80 C 130 88, 138 98, 148 110" fill="none" stroke="#e8c0d0" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
</svg>
